<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunidad Oficial de Conejo Malo | Official Fan & PR Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
font-family:'Montserrat',sans-serif;
background:#0a0a12;
color:white;
overflow-x:hidden;
}

/* Background Orbs */
.parallax-bg{
position:fixed;
top:0;left:0;width:100%;height:100%;
overflow:hidden;z-index:-1;
}
.orb{
position:absolute;border-radius:50%;
filter:blur(140px);opacity:0.45;
animation:float 18s infinite ease-in-out alternate;
}
.orb1{
width:600px;height:600px;
background:radial-gradient(circle,#ff0077,#330066);
top:5%;left:5%;
}
.orb2{
width:700px;height:700px;
background:radial-gradient(circle,#00c3ff,#002244);
bottom:5%;right:5%;
animation-duration:22s;
}
@keyframes float{
from{transform:translateY(0px) scale(1);}
to{transform:translateY(-80px) scale(1.1);}
}

/* Sections */
section{padding:100px 20px;text-align:center;}
h2{font-size:36px;margin-bottom:40px;}

/* Forms */
input{
width:100%;max-width:400px;padding:15px;margin:10px auto;
display:block;border:none;border-radius:10px;
background:#1f1f2e;color:white;
}
button{
width:100%;max-width:400px;padding:15px;margin:10px auto;
display:block;border:none;border-radius:40px;
background:linear-gradient(45deg,#ff0077,#ff4da6);
color:white;font-weight:600;cursor:pointer;
}

/* Dashboard */
#dashboard{
display:none;
padding:100px 20px;
text-align:center;
}
#dashboard h2{margin-bottom:20px;}
#userEmail{margin-bottom:30px;font-size:18px;opacity:0.85;}

footer{
padding:40px;background:#0a0a10;
text-align:center;font-size:14px;opacity:0.7;
}
</style>
</head>

<body>

<div class="parallax-bg">
<div class="orb orb1"></div>
<div class="orb orb2"></div>
</div>

<section id="auth">
<h2>Member Login / Register</h2>

<input id="authEmail" type="email" placeholder="Enter Email" required>
<input id="authPassword" type="password" placeholder="Enter Password (min 6 characters)" required>
<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>
</section>

<!-- MEMBER DASHBOARD -->
<section id="dashboard">
<h2>Member Dashboard</h2>
<p id="userEmail"></p>
<button id="logoutBtn">Logout</button>
</section>

<footer>
© 2026 Comunidad Oficial de Conejo Malo
</footer>

<!-- FIREBASE AUTH SYSTEM -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDpFAL7wX__ee1bmbr25A81IBuWEnpq970",
authDomain: "conejomalo-global.firebaseapp.com",
projectId: "conejomalo-global",
storageBucket: "conejomalo-global.firebasestorage.app",
messagingSenderId: "886224291739",
appId: "1:886224291739:web:f54c336ac7ea4e3512c33e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authSection = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const userEmailDisplay = document.getElementById("userEmail");

// REGISTER
document.getElementById("registerBtn").addEventListener("click", () => {
const email = document.getElementById("authEmail").value;
const password = document.getElementById("authPassword").value;

createUserWithEmailAndPassword(auth, email, password)
.then(() => alert("Registration successful ✅"))
.catch(error => alert(error.message));
});

// LOGIN
document.getElementById("loginBtn").addEventListener("click", () => {
const email = document.getElementById("authEmail").value;
const password = document.getElementById("authPassword").value;

signInWithEmailAndPassword(auth, email, password)
.then(() => alert("Login successful ✅"))
.catch(error => alert(error.message));
});

// AUTH STATE LISTENER
onAuthStateChanged(auth, (user) => {
if (user) {
authSection.style.display = "none";
dashboard.style.display = "block";
userEmailDisplay.textContent = "Welcome, " + user.email;
} else {
authSection.style.display = "block";
dashboard.style.display = "none";
}
});

// LOGOUT
document.getElementById("logoutBtn").addEventListener("click", () => {
signOut(auth).then(() => {
alert("Logged out successfully ✅");
});
});
</script>

</body>
</html>
